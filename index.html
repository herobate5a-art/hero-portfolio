<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeroDev | Professional Portfolio</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --bg: #020617;
            --card-bg: #0f172a;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }

        /* background animation */
        .bg-grid {
            position: fixed; inset: 0; z-index: -1;
            background-image: radial-gradient(var(--accent) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.05;
        }

        /* Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
        nav a { color: var(--text-dim); text-decoration: none; margin-left: 20px; font-weight: 600; transition: 0.3s; }
        nav a:hover { color: var(--accent); }

        /* Hero */
        .hero { text-align: center; padding: 120px 20px; }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; margin-bottom: 15px; }
        .hero span { color: var(--accent); }
        .hero p { color: var(--text-dim); font-size: 1.2rem; max-width: 600px; margin: 0 auto; }

        /* Sections General */
        section { padding: 80px 8%; }
        h2 { font-size: 2.2rem; margin-bottom: 40px; position: relative; display: inline-block; }
        h2::after { content: ''; position: absolute; bottom: -10px; left: 0; width: 50px; height: 4px; background: var(--accent); border-radius: 2px; }

        /* Projects Grid */
        .projects-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px; margin-top: 30px;
        }
        .card {
            background: var(--card-bg); border-radius: 18px; border: 1px solid var(--border);
            overflow: hidden; display: flex; flex-direction: column; transition: 0.3s;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }

        .card-img {
            height: 180px; background: #020617; display: flex; justify-content: center; align-items: center;
            border-bottom: 1px solid var(--border); perspective: 1000px;
        }
        .logo-3d { font-size: 3rem; font-weight: 900; color: var(--accent); transform: rotateX(20deg) rotateY(-10deg); text-shadow: 0 10px 20px rgba(56,189,248,0.3); }

        .card-content { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-content h3 { font-size: 1.3rem; margin-bottom: 10px; }
        .card-content p { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; }

        .card-btns { display: flex; gap: 10px; margin-top: auto; }
        .card-btns button { 
            flex: 1; padding: 10px; border-radius: 8px; cursor: pointer; 
            font-weight: 700; border: none; transition: 0.3s; 
        }
        .btn-view { background: #1e293b; color: var(--accent); }
        .btn-view:hover { background: var(--accent); color: #020617; }
        .btn-test { background: #22c55e; color: white; }
        .btn-test:hover { background: #16a34a; }

        /* Feedback Section */
        .feedback-layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; align-items: start; }
        @media (max-width: 900px) { .feedback-layout { grid-template-columns: 1fr; } }

        .form-card, .list-card { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border); }

        .user-box { display: none; align-items: center; gap: 12px; background: #1e293b; padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .user-box img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); }

        .stars-input { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 5px; margin-bottom: 15px; }
        .stars-input input { display: none; }
        .stars-input label { font-size: 2rem; color: #1e293b; cursor: pointer; }
        .stars-input label:hover, .stars-input label:hover ~ label, .stars-input input:checked ~ label { color: #fbbf24; }

        .review-item { background: #020617; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
        .review-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .review-header img { width: 40px; height: 40px; border-radius: 50%; }
        .rev-name { font-weight: 700; font-size: 0.95rem; }
        .rev-stars { color: #fbbf24; font-size: 0.8rem; display: block; }

        /* Modals */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-box {
            background: var(--card-bg); border: 1px solid var(--accent); width: 100%; max-width: 700px;
            border-radius: 24px; position: relative; max-height: 90vh; overflow-y: auto; padding: 40px;
        }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 2rem; cursor: pointer; color: #ef4444; }
        .modal-body ul { margin-top: 15px; list-style: none; }
        .modal-body li { margin-bottom: 8px; color: var(--text-dim); position: relative; padding-left: 20px; }
        .modal-body li::before { content: '✓'; position: absolute; left: 0; color: var(--accent); }

        .btn-main { background: var(--accent); color: #020617; padding: 14px 30px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; width: 100%; }
        
        .hidden { opacity: 0; transform: translateY(30px); transition: 0.8s; }
        .show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <header>
        <div class="logo">HERO<span>DEV</span></div>
        <nav>
            <a href="#projects">Systems</a>
            <a href="#feedback">Reviews</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section class="hero hidden">
        <h1>Building <span>Experiences</span></h1>
        <p>Professional Roblox Scripter & 3D Designer specializing in high-performance systems and immersive gameplay.</p>
    </section>

    <section id="projects" class="hidden">
        <h2>My Projects</h2>
        <div class="projects-grid">
            <script>
                const projectData = [
                    { id: 'camel', title: 'Camel System', desc: 'Physics-based mounting and movement system with custom animations.', link: 'https://www.roblox.com/games/90983539911277/Camel-Player-Animations' },
                    { id: 'inventory', title: 'Advanced Inventory', desc: 'Full OOP inventory with categories, equipment, and secure saving.', link: 'https://www.roblox.com/games/72059232064944/InventorySystem-Armor' },
                    { id: 'spin', title: 'Spin Wheel UI', desc: 'Weighted reward system with luck multipliers and high-quality UI.', link: 'https://www.roblox.com/games/130744078216219/SpienWheel' },
                    { id: 'stamina', title: 'Stamina & Dash', desc: 'Smooth movement mechanics with state detection and energy management.', link: 'https://www.roblox.com/games/114021472064448/Stamina-and-Sprint-System' },
                    { id: 'clicker', title: 'Click Simulator', desc: 'A complete progression loop with rebirth scaling and secure rewards.', link: 'https://www.roblox.com/games/102709726664311/ClickSemlutor-RebirthSystem' },
                    { id: 'hatching', title: 'Pet Hatching', desc: 'Multi-egg system with rarity logic and reveal sequences.', link: 'https://www.roblox.com/games/134109808658327/HatchingPets' }
                ];

                document.write(projectData.map(p => `
                    <div class="card">
                        <div class="card-img"><div class="logo-3d">HERO</div></div>
                        <div class="card-content">
                            <h3>${p.title}</h3>
                            <p>${p.desc}</p>
                            <div class="card-btns">
                                <button class="btn-view" onclick="openSystem('${p.id}')">View Details</button>
                                <button class="btn-test" onclick="window.open('${p.link}', '_blank')">Test Game</button>
                            </div>
                        </div>
                    </div>
                `).join(''));
            </script>
        </div>
    </section>

    <section id="feedback" class="hidden">
        <h2>Client Feedback</h2>
        <div class="feedback-layout">
            <div class="form-card">
                <h3>Write a Review</h3>
                <div id="google-login-btn" style="margin: 20px 0;">
                    <div id="g_id_onload" data-client_id="442956210324-v8g0622v9sc8k6i8k9i8k9i8k9i8.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                    <div class="g_id_signin" data-type="standard"></div>
                </div>

                <div class="user-box" id="userInfo">
                    <img src="" id="userPhoto">
                    <span id="userName"></span>
                </div>

                <form id="reviewForm">
                    <div class="stars-input">
                        <input type="radio" id="s5" name="rating" value="5" required><label for="s5">★</label>
                        <input type="radio" id="s4" name="rating" value="4"><label for="s4">★</label>
                        <input type="radio" id="s3" name="rating" value="3"><label for="s3">★</label>
                        <input type="radio" id="s2" name="rating" value="2"><label for="s2">★</label>
                        <input type="radio" id="s1" name="rating" value="1"><label for="s1">★</label>
                    </div>
                    <textarea id="reviewMsg" placeholder="Describe your experience..." style="width:100%; background:#020617; border:1px solid var(--border); color:white; padding:15px; border-radius:10px; min-height:100px; margin-bottom:15px; outline:none;"></textarea>
                    <div class="cf-turnstile" data-sitekey="YOUR_TURNSTILE_SITE_KEY"></div>
                    <button type="submit" class="btn-main" style="margin-top:15px;">Post Review</button>
                </form>
            </div>

            <div class="list-card">
                <div style="margin-bottom:20px;">
                    <span style="font-size:2.5rem; font-weight:800;" id="avgScore">0.0</span>
                    <span style="color:var(--text-dim); margin-left:10px;" id="reviewCount">0 reviews</span>
                </div>
                <div id="reviewsContainer"></div>
            </div>
        </div>
    </section>

    <div class="modal" id="modalOverlay">
        <div class="modal-box">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="mTitle" style="color:var(--accent);">System Details</h2>
            <div id="mBody" class="modal-body"></div>
        </div>
    </div>

    <script>
        // --- Firebase Init ---
        const firebaseConfig = {
            apiKey: "AIzaSyA9zjaTxTY5eBPgLV0zjFkNvZyvZ8nqCeo",
            authDomain: "hero-portfolio-1c64b.firebaseapp.com",
            projectId: "hero-portfolio-1c64b",
            storageBucket: "hero-portfolio-1c64b.firebasestorage.app",
            messagingSenderId: "442956210324",
            appId: "1:442956210324:web:b43e09be0d6d018831481"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentUser = null;

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            currentUser = { name: payload.name, photo: payload.picture };
            document.getElementById('google-login-btn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('userPhoto').src = currentUser.photo;
        }

        document.getElementById('reviewForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!currentUser) return alert("Please Login First!");
            const rating = document.querySelector('input[name="rating"]:checked').value;
            const text = document.getElementById('reviewMsg').value;
            await db.collection("reviews").add({
                name: currentUser.name, photo: currentUser.photo,
                rating: parseInt(rating), text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('reviewForm').reset();
        });

        db.collection("reviews").orderBy("timestamp", "desc").onSnapshot(snap => {
            const container = document.getElementById('reviewsContainer');
            container.innerHTML = "";
            let sum = 0;
            snap.forEach(doc => {
                const d = doc.data();
                sum += d.rating;
                container.innerHTML += `
                    <div class="review-item">
                        <div class="review-header">
                            <img src="${d.photo}">
                            <div>
                                <span class="rev-name">${d.name}</span>
                                <span class="rev-stars">${"★".repeat(d.rating)}</span>
                            </div>
                        </div>
                        <p style="font-size:0.9rem; color:var(--text-dim);">${d.text}</p>
                    </div>
                `;
            });
            if(snap.size > 0) {
                document.getElementById('avgScore').innerText = (sum/snap.size).toFixed(1);
                document.getElementById('reviewCount').innerText = `${snap.size} reviews`;
            }
        });

        const details = {
            camel: { title: "Camel Movement System", body: "<h3>Key Features:</h3><ul><li>Physics-driven camel rig with acceleration/deceleration logic.</li><li>Custom mounting system with character synchronization.</li><li>Modular architecture for easy integration.</li></ul>" },
            inventory: { title: "Advanced Inventory System", body: "<h3>Key Features:</h3><ul><li>Object-Oriented (OOP) structure for scalability.</li><li>Weight system, item categories, and equipment slots.</li><li>Secure DataStore saving for all items.</li></ul>" },
            spin: { title: "Spin Wheel UI", body: "<h3>Key Features:</h3><ul><li>Server-validated reward calculation.</li><li>Smooth UI animations using TweenService.</li><li>Custom probability tables (Rarity System).</li></ul>" },
            stamina: { title: "Stamina & Sprint System", body: "<h3>Key Features:</h3><ul><li>Dynamic energy consumption for actions like Sprint and Dash.</li><li>State detection (Idle, Walk, Run).</li><li>High-performance RunService implementation.</li></ul>" },
            clicker: { title: "Click Simulator", body: "<h3>Key Features:</h3><ul><li>Exponential rebirth cost scaling.</li><li>Anti-cheat click verification.</li><li>Leaderboard integration for Gems and Clicks.</li></ul>" },
            hatching: { title: "Pet Hatching System", body: "<h3>Key Features:</h3><ul><li>Cinematic reveal animations with rarity themes.</li><li>Multiple egg tiers and luck boost compatibility.</li></ul>" }
        };

        function openSystem(id) {
            const data = details[id];
            document.getElementById('mTitle').innerText = data.title;
            document.getElementById('mBody').innerHTML = data.body;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

        // Intersection Observer for animations
        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('show'); });
        });
        document.querySelectorAll('.hidden').forEach(el => obs.observe(el));
    </script>
</body>
</html>
