<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero | Roblox Developer</title>

<style>

/* GLOBAL */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

html{
scroll-behavior:smooth;
}

body{
font-family:Arial;
background:#020617;
color:white;
overflow-x:hidden;
}

/* LOADER */

#loader{
position:fixed;
width:100%;
height:100vh;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
color:#38bdf8;
z-index:9999;
animation:fadeOut 1s ease 2.5s forwards;
}

@keyframes fadeOut{
to{
opacity:0;
visibility:hidden;
}
}

/* BACKGROUND */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#38bdf822 1px,transparent 1px);
background-size:40px 40px;
animation:bgMove 40s linear infinite;
z-index:-1;
}

@keyframes bgMove{
0%{transform:translate(0,0);}
100%{transform:translate(-300px,-300px);}
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
background:#020617;
position:sticky;
top:0;
z-index:10;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:24px;
font-weight:bold;
color:#38bdf8;
}

nav a{
color:white;
margin-left:25px;
text-decoration:none;
transition:.3s;
}

nav a:hover{
color:#38bdf8;
}

/* HERO */

.hero{
text-align:center;
padding:140px 20px;
}

.hero h1{
font-size:60px;
}

.hero span{
color:#38bdf8;
}

.hero p{
margin-top:10px;
color:#94a3b8;
}

.btn{
display:inline-block;
margin-top:25px;
padding:14px 30px;
background:#38bdf8;
color:black;
border-radius:10px;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 20px #38bdf8;
transition:.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* SECTIONS */

section{
padding:80px 10%;
}

/* PROJECT GRID */

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
margin-top:40px;
}

/* CARD */

.card{
background:#020617;
border-radius:16px;
overflow:hidden;
border:1px solid #1e293b;
transition:.4s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 30px #38bdf8;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card h3{
color:#38bdf8;
margin-bottom:8px;
}

.card p{
color:#94a3b8;
}

.buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.card button{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.view{
background:#38bdf8;
}

.test{
background:#22c55e;
color:white;
}

.coming{
background:#1e293b;
color:#94a3b8;
cursor:not-allowed;
}

/* MODAL FRAME */

#systemModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
width:70%;
max-width:900px;
max-height:80vh;
overflow-y:auto;
background:#020617;
border:1px solid #1e293b;
border-radius:15px;
padding:30px;
box-shadow:0 0 40px #38bdf8;
animation:modalOpen .4s ease;
}

@keyframes modalOpen{
from{
transform:scale(.8);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.modal-content h2{
color:#38bdf8;
margin-bottom:15px;
}

.modal-content p{
color:#94a3b8;
line-height:1.6;
white-space:pre-line;
}

.close-btn{
margin-top:20px;
padding:10px 25px;
background:#ef4444;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

footer{
text-align:center;
padding:40px;
border-top:1px solid #1e293b;
color:#94a3b8;
}

</style>
</head>

<body>

<div id="loader">Loading Portfolio...</div>

<header>

<div class="logo">HeroDev</div>

<nav>
<a href="#about">About</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>

</header>

<section class="hero">

<h1>Hello I'm <span>Hero</span></h1>
<p>Roblox Developer | Lua Scripter</p>

<a class="btn" href="#projects">See My Work</a>

</section>

<section id="projects">

<h2>Projects</h2>

<div class="projects">

<div class="card">
<img src="https://picsum.photos/400/200?11">
<div class="card-content">
<h3>Inventory System</h3>
<p>Advanced inventory system.</p>

<div class="buttons">
<button class="view" onclick="openSystem('inventory')">View</button>
<button class="test" onclick="joinGame('https://www.roblox.com/games/72059232064944/InventorySystem-Armor')">Test</button>
</div>

</div>
</div>

</div>

</section>

<!-- MODAL -->

<div id="systemModal">

<div class="modal-content">

<h2 id="systemTitle"></h2>

<p id="systemDescription"></p>

<button class="close-btn" onclick="closeModal()">Close</button>

</div>

</div>

<footer>

<p>© 2026 Hero Roblox Developer</p>

</footer>

<script>

function joinGame(url){
window.open(url,"_blank")
}

const systems = {

inventory:{

title:"Advanced Roblox Inventory System",

description:`🚀 Advanced Roblox Inventory System

🎒 Smart Inventory Management
Clean and organized inventory interface
Scrollable item grid
Multiple item categories
Automatic inventory updates

🧠 Object-Oriented Architecture
Built using OOP
Scalable code structure
Easy expansion

⚡ Client-Server Communication
Uses RemoteEvents
Real-time sync

🎮 Interactive UI
Smooth responsive interface
Highlight effects
Item selection feedback

💾 DataStore Support
Persistent inventory saving

🛡️ Secure Server Validation
Anti exploit protection

🎯 Perfect For
Simulator Games
RPG Games
Adventure Games`
}

}

function openSystem(system){

const modal=document.getElementById("systemModal")
const title=document.getElementById("systemTitle")
const desc=document.getElementById("systemDescription")

title.innerText=systems[system].title
desc.innerText=systems[system].description

modal.style.display="flex"

}

function closeModal(){

document.getElementById("systemModal").style.display="none"

}

</script>

</body>
</html>
