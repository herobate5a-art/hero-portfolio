<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* HEADER */

header{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

header h1{
font-size:60px;
margin:0;
}

header p{
color:#aaa;
}

/* PROJECTS */

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
padding:60px;
}

.card{
background:#111;
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.buttons{
display:flex;
gap:10px;
margin-top:10px;
}

button{
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

.view{
background:#444;
color:white;
}

.test{
background:#00ff99;
color:black;
}

/* ANIMATION */

.hidden{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.show{
opacity:1;
transform:translateY(0);
}

/* CURSOR */

.cursor{
position:fixed;
width:20px;
height:20px;
border:2px solid white;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
}

</style>
</head>

<body>

<div class="cursor"></div>

<header>
<h1>My Roblox Systems</h1>
<p>Game Systems I Created</p>
</header>

<section class="projects">

<!-- Hatching -->
<div class="card hidden">
<img src="https://picsum.photos/400/200?2">
<div class="card-content">
<h3>Hatching Egg System + UI</h3>
<p>Pet hatch system.</p>
<div class="buttons">
<button class="view">View</button>
<button class="test" onclick="openGame('https://www.roblox.com/games/134109808658327/HatchingPets')">Test</button>
</div>
</div>
</div>

<!-- Spin -->
<div class="card hidden">
<img src="https://picsum.photos/400/200?3">
<div class="card-content">
<h3>Spin Wheel + UI</h3>
<p>Reward wheel system.</p>
<div class="buttons">
<button class="view">View</button>
<button class="test" onclick="openGame('https://www.roblox.com/games/130744078216219/SpienWheel')">Test</button>
</div>
</div>
</div>

<!-- Click Simulator -->
<div class="card hidden">
<img src="https://picsum.photos/400/200?4">
<div class="card-content">
<h3>Click Simulator</h3>
<p>Simulator gameplay system.</p>
<div class="buttons">
<button class="view">View</button>
<button class="test" onclick="openGame('https://www.roblox.com/games/102709726664311/ClickSemlutor-RebirthSystem')">Test</button>
</div>
</div>
</div>

<!-- Trading -->
<div class="card hidden">
<img src="https://picsum.photos/400/200?5">
<div class="card-content">
<h3>Trading System</h3>
<p>Player trading system.</p>
<div class="buttons">
<button class="view">View</button>
<button class="test" onclick="openGame('https://www.roblox.com')">Test</button>
</div>
</div>
</div>

</section>

<script>

window.addEventListener("load",()=>{
window.scrollTo(0,0)
})

function openGame(url){
window.open(url,"_blank")
}

const observer = new IntersectionObserver((entries)=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show")
}
})
},{threshold:0.2})

document.querySelectorAll(".hidden").forEach(el=>{
observer.observe(el)
})

const cursor=document.querySelector(".cursor")

document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"
})

</script>

</body>
</html>
